name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    # Full-adopt of the reusable workflow (replaces the bespoke test-only CI, and adds the missing
    # gate: format/discipline + SwiftLint metrics + config/manifest drift). ADServe depends on the
    # first-party siblings ADJSON / ADConcurrency (resolved from branch: main), so the
    # resolution-dependent jobs stay gated on AD_SWIFT_SIBLINGS_PUBLISHED — the same gate the bespoke
    # workflow used. The Linux container moves from the stale swift:6.3 to the canonical 6.4 nightly.
    uses: g-cqd/ADBuildTools/.github/workflows/swift-quality.yml@v1
    with:
      dev-env-var: ADSERVE_DEV
      requires-published-siblings: true

  mime-codegen-drift:
    # Drift guard: the MIME table is GENERATED (vendored jshttp/mime-db -> the committed
    # `Sources/ADServeCore/Generated/MIMEDatabase.swift`) and the generator is deterministic, so
    # re-running it must produce zero diff. Catches a hand-edit of the generated file or a stale table
    # after a mime-db snapshot bump. `swift run` resolves the full package (the first-party siblings from
    # branch: main), so this gates on the same AD_SWIFT_SIBLINGS_PUBLISHED signal as `quality`.
    name: MIME table in sync
    if: ${{ vars.AD_SWIFT_SIBLINGS_PUBLISHED == 'true' }}
    runs-on: ubuntu-latest
    # The canonical dated 6.4 nightly (matches the reusable workflow's pinned container + `.swift-version`).
    # Dated tag pins the toolchain for reproducible CI; bump deliberately like a dependency (#14).
    container: swiftlang/swift:nightly-6.4-2026-06-18-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Regenerate the MIME table
        run: swift run ADServeMimeCodegen
      - name: Assert the committed table matches the generator output
        run: git diff --exit-code -- Sources/ADServeCore/Generated/MIMEDatabase.swift
